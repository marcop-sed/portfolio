site_name: Marco Pulicanò - Offensive Security & Engineering Portfolio
site_author: Ing. Marco P.
site_description: Reportistica tecnica, assessment AD/Web/Network, threat modeling e remediation strategy.
site_url: https://marcop-sed.github.io/portfolio/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark Mode
    # Dark mode (default)
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light Mode
  
  font:
    text: Roboto
    code: JetBrains Mono
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow
    - content.code.copy
    - content.code.select
    - search.suggest
    - search.highlight

plugins:
  - search:
      lang: it

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - 🏠 Home: index.md
  - 🔴 Offensive Security:
    - Web Application - Imagery: imagery.md
    - Network & Crypto - Expressway: expressway.md
    - AD Infrastructure - DarkZero: darkzero.md
    - Kerberos & SQL - Signed: signed.md
  - ⚙️ Projects:
    - Boot2Root Design - Waifu Gallery: eth.md
